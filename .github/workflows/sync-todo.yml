name: Sync TODO to Issues
on:
  push:
    branches: [main]
    paths: [todo.md]
permissions:
  issues: write
  contents: read
jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: node .github/scripts/sync-todo.js
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
